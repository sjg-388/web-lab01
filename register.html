<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: lightgray;
            color: darkslategrey;
        }
    </style>
</head>
<body>
    <header> 
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <form action="/action_page.php" method="post">
            <fieldset>
                <legend>기본 정보(Essential)</legend>
                <label for="id">아이디:</label><br>
                <input type="text" id="id" name="id" required><br><br>
                <label for="password">비밀번호:</label><br>
                <input type="password" id="password" name="password" required><br><br>
                <label for="email">이메일:</label><br>
                <input type="email" id="email" name="email" placeholder="xxxxx@xxxxx.com" required><br><br>
            </fieldset>
            <fieldset>
                <legend>추가 정보(Optional)</legend>
                <label for="phone">연락처:</label><br>
                <input type="text" id="phone" name="phone" placeholder="010-0000-0000" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"><br><br>
                <label for="interest">관심 분야:</label><br>
                <input type="radio" id="HTML" name="interest" value="HTML">
                <label for="HTML">HTML</label><br>
                <input type="radio" id="CSS" name="interest" value="CSS">
                <label for="CSS">CSS</label><br>
                <input type="radio" id="JavaScript" name="interest" value="JavaScript">
                <label for="JavaScript">JavaScript</label><br><br>
                <label for="skill">숙련도:</label><br>
                <input type="range" id="skill" name="skill" min="0" max="10" step="1"><br>
            </fieldset>
            <br>
            <input type="submit" value="가입 신청">
            <input type="reset" value="초기화">
        </form>
    </main>
    <footer>
        <p><a href="./index.html">홈으로</a></p>
        <p>&copy; 2026 Web Programming Course. All rights reserved.</p>
    </footer>
</body>
</html>
